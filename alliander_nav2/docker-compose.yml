services:
  alliander_nav2:
    image: allianderrobotics/nav2
    container_name: alliander_nav2
    network_mode: host
    privileged: true
    mem_limit: 6gb
    tty: true
    env_file:
      - .env
    volumes:
      - "/tmp/.X11-unix:/tmp/.X11-unix"
      - "/dev:/dev"
    command: ["/bin/bash", "-c", "ros2 launch alliander_nav2 nav2.launch.py"]

