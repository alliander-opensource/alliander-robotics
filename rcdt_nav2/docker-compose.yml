services:
  rcdt_nav2:
    image: rcdt/robotics:nav2-${IMAGE_TAG}
    container_name: rcdt_nav2
    network_mode: host
    privileged: true
    mem_limit: 6gb
    tty: true
    volumes:
      - "/tmp/.X11-unix:/tmp/.X11-unix"
      - "/dev:/dev"
    environment:
      - "DISPLAY"
      - "RCUTILS_COLORIZED_OUTPUT=1"
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
    command: ["/bin/bash", "-c", "ros2 launch rcdt_nav2 nav2.launch.py"]

