services:
  rcdt_franka:
    image: rcdt/robotics:franka-${IMAGE_TAG}
    container_name: rcdt_franka
    network_mode: host
    privileged: true
    mem_limit: 6gb
    tty: true
    env_file:
      - .env
    volumes:
      - "/tmp/.X11-unix:/tmp/.X11-unix"
      - "/dev:/dev"
    command: ["/bin/bash", "-c", "ros2 launch rcdt_franka franka.launch.py"]
