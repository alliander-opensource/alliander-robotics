services:
  rcdt_gazebo:
    image: rcdt/robotics:gazebo-${IMAGE_TAG}
    container_name: rcdt_gazebo
    runtime: nvidia
    network_mode: host
    privileged: true
    mem_limit: 6gb
    tty: true
    group_add:
      - "video" # Allows camera access on all platforms, no matter the allocated user rights
    volumes:
      - "/tmp/.X11-unix:/tmp/.X11-unix"
      - "/dev:/dev"
    environment:
      - "DISPLAY"
      - "RCUTILS_COLORIZED_OUTPUT=1"
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
      - GZ_SIM_RESOURCE_PATH=/rcdt/ros/src
    command: ["/bin/bash", "-c", "ros2 launch rcdt_gazebo gazebo.launch.py"]
