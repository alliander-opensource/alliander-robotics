services:
  rcdt_tests:
    image: rcdt/robotics:tests-${IMAGE_TAG}
    container_name: rcdt_tests
    runtime: nvidia
    network_mode: host
    privileged: true
    mem_limit: 6gb
    tty: true
    group_add:
      - "video" # Allows camera access on all platforms, no matter the allocated user rights
    volumes:
      - "/tmp/.X11-unix:/tmp/.X11-unix"
      - "/dev:/dev"
      - "/var/run/docker.sock:/var/run/docker.sock"
      - "./:/rcdt_robotics/"
    environment:
      - "DISPLAY"
      - "RCUTILS_COLORIZED_OUTPUT=1"
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
      - GIT_CONFIG_COUNT=1
      - GIT_CONFIG_KEY_0=safe.directory
      - GIT_CONFIG_VALUE_0=*
      - PRE_COMMIT_HOME=/rcdt_robotics/.cache/pre-commit
    command:
      ["/bin/bash", "-c", "cd /rcdt_robotics"]
