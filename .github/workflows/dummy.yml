name: dummy

on:
  push:
    branches: [main]

  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  test-with-xvfb:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Set up python3
        uses: actions/setup-python@v5
        with:
          # need to specify version to circumvent externally-managed act python
          # which won't let us install dependencies
          python-version: "3.12"
          cache: "pip"
      - name: Install dependencies
        run: pip install pyyaml mashumaro
      - name: Install xvfb
        run: sudo apt-get update && sudo apt-get install -y xvfb
      - name: Run tests in alliander_tests container
        run: xvfb-run -a python3 start.py --pytest-no-nvidia
  test-without-xvfb:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Set up python3
        uses: actions/setup-python@v5
        with:
          # need to specify version to circumvent externally-managed act python
          # which won't let us install dependencies
          python-version: "3.12"
          cache: "pip"
      - name: Install dependencies
        run: pip install pyyaml mashumaro
      - name: Run tests in alliander_tests container
        run: python3 start.py --pytest-no-nvidia
