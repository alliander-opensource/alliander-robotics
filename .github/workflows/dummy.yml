# TODO: REMOVE THIS FILE IF BRANCH PROTECTION RULES ARE UPDATED

name: dummy 

on:
  push:
    branches: [main]

  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  test-with-xvfb:
    runs-on: ubuntu-24.04
    steps:
      - name: Install xvfb and xeyes
        run: sudo apt-get update && sudo apt-get install -y xvfb x11-apps
      - name: Run xeyes
        run: xvfb-run -a xeyes
  test-without-xvfb:
    runs-on: ubuntu-24.04
    steps:
      - name: Install xeyes
        run: sudo apt-get update && sudo apt-get install -y x11-apps
      - name: Run xeyes
        run: xeyes