name: docker

on:
  push:
    branches: [main]

  pull_request:
    branches: [main]
    # types: [opened, synchronize, reopened, ready_for_review]

jobs:
  detect-changes:
    # if: github.event_name == 'push' || github.event.pull_request.draft == false
    runs-on: ubuntu-24.04 
    outputs:
      matrix_base: ${{ steps.set-matrix.outputs.matrix_base }}
      matrix_cuda: ${{ steps.set-matrix.outputs.matrix_cuda }}
      has_changes_base: ${{ steps.set-matrix.outputs.has_changes_base }}
      has_changes_cuda: ${{ steps.set-matrix.outputs.has_changes_cuda }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Detect changed subdirectories
        id: set-matrix
        run: |
          CHANGES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)

          CHANGED_DIRS=()
          CORE_CHANGED=false
          if [[ "$CHANGES" == *"rcdt_core/"* ]] ; then
            CORE_CHANGED=true
            echo "rcdt_core changed -- will rebuild all components"
          fi

          for d in *rcdt_* ; do
            # If rcdt_core has changes, we want to build all images anew
            if [[ "$CORE_CHANGED" == true ]] || [[ "$CHANGES" ==  *"${d}/"* ]] ; then 
              CHANGED_DIRS+=("$d")
            fi
          done

          echo "Changed directories: ${CHANGED_DIRS[*]}"

          if [ ${#CHANGED_DIRS[@]} -eq 0 ]; then
            echo "has_changes_base=false" >> $GITHUB_OUTPUT
            echo "has_changes_cuda=false" >> $GITHUB_OUTPUT
            echo "matrix_base={\"include\":[]}" >> $GITHUB_OUTPUT
            echo "matrix_cuda={\"include\":[]}" >> $GITHUB_OUTPUT
            echo "No components have changes."
            exit 0
          fi

          CHANGED_JSON=$(printf '%s\n' "${CHANGED_DIRS[@]}" | jq -R . | jq -s -c '.')

          parse_section() {
            local section=$1
            yq -o=json ".${section}" components.yml | jq -c --argjson changed "$CHANGED_JSON" '[
              to_entries[] |
                .key as $name |
                if (.value | type) == "array" then
                  .value[] | . + {"name": $name}
                else
                  .value + {"name": $name}
                end |
                {
                  "name": .name,
                  "base_image": .base_image,
                  "tag": .tag,
                  "dockerfile": .dockerfile
                }
            ] | map(select(.name as $n | $changed | index($n)))'
          }

          expand_matrix() {
            local original_matrix=$1
            echo "$original_matrix" | jq -c '[
              .[] |
              (. + {
                "runner": "ubuntu-24.04",
              }),
              (. + {
                "runner": "ubuntu-24.04-arm",
              })
            ]'
          }

          MATRIX_BASE=$(parse_section "base")
          MATRIX_CUDA=$(parse_section "cuda")

          EXPANDED_MATRIX_BASE=$(expand_matrix "$MATRIX_BASE")
          EXPANDED_MATRIX_CUDA=$(expand_matrix "$MATRIX_CUDA")

          echo "Base change matrix: $EXPANDED_MATRIX_BASE"
          echo "CUDA change matrix: $EXPANDED_MATRIX_CUDA"
          
          if [ "$MATRIX_BASE" == "[]" ] || [ "$MATRIX_BASE" == "null" ]; then
            echo "has_changes_base=false" >> $GITHUB_OUTPUT
            echo "matrix_base={\"include\":[]}" >> $GITHUB_OUTPUT
          else
            echo "has_changes_base=true" >> $GITHUB_OUTPUT
            echo "matrix_base={\"include\":$EXPANDED_MATRIX_BASE}" >> $GITHUB_OUTPUT
          fi
          
          if [ "$MATRIX_CUDA" == "[]" ] || [ "$MATRIX_CUDA" == "null" ]; then
            echo "has_changes_cuda=false" >> $GITHUB_OUTPUT
            echo "matrix_cuda={\"include\":[]}" >> $GITHUB_OUTPUT
          else
            echo "has_changes_cuda=true" >> $GITHUB_OUTPUT
            echo "matrix_cuda={\"include\":$EXPANDED_MATRIX_CUDA}" >> $GITHUB_OUTPUT
          fi

  build-base:
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect-changes.outputs.matrix_base) }}
    runs-on: ${{ matrix.runner }}
    needs: detect-changes
    if: needs.detect-changes.outputs.has_changes_base == 'true'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - uses: actions/checkout@v4
      - name: Free disk space 
        uses: ./.github/actions/free-disk-space
        with:
          tool-cache: true
      - name: Clear disk space 
        uses: ./.github/actions/clear-disk-space
      - name: Docker login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}
      - name: Build and push ${{ matrix.tag }}
        uses: docker/build-push-action@v6
        with:
          push: true
          context: .
          file: ${{ matrix.dockerfile }}
          tags: rcdt/robotics:${{ matrix.tag }}
          build-args: |
            BASE_IMAGE=${{ matrix.base_image }}
          cache-from: |
            type=gha
            type=registry,ref=rcdt/robotics:${{ matrix.tag }}-buildcache
          cache-to: |
            type=gha,mode=max
            type=registry,ref=rcdt/robotics:${{ matrix.tag }}-buildcache,mode=max
      - run: df -h /

  build-cuda:
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect-changes.outputs.matrix_cuda) }}
    runs-on: ${{ matrix.runner }} 
    needs: [detect-changes, build-base]
    if: needs.detect-changes.outputs.has_changes_cuda == 'true'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - uses: actions/checkout@v4
      - name: Free disk space 
        uses: ./.github/actions/free-disk-space
        with:
          tool-cache: true
      - name: Clear disk space 
        uses: ./.github/actions/clear-disk-space
      - name: Docker login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}
      - name: Build and push ${{ matrix.tag }}
        uses: docker/build-push-action@v6
        with:
          push: true
          context: .
          file: ${{ matrix.dockerfile }}
          tags: rcdt/robotics:${{ matrix.tag }}
          build-args: |
            BASE_IMAGE=${{ matrix.base_image }}
          cache-from: type=registry,ref=rcdt/robotics:${{ matrix.tag }}-buildcache
          cache-to: type=registry,ref=rcdt/robotics:${{ matrix.tag }}-buildcache,mode=max
      - run: df -h /
  
  linting:
    runs-on: ubuntu-24.04
    needs: [build-base, build-cuda] 
    steps: 
      - uses: actions/checkout@v4
      - name: Set up python3
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - name: Install dependencies
        run: pip install pyyaml mashumaro
      - name: Run linting in rcdt_tests container
        run: python3 start.py --linting

  test:
    strategy:
      matrix:
        arch: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.arch }}
    needs: linting
    steps:
      - uses: actions/checkout@v4
      - name: Free disk space 
        uses: ./.github/actions/free-disk-space
        with:
          tool-cache: true
      - name: Clear disk space 
        uses: ./.github/actions/clear-disk-space
      - name: Set up python3
        uses: actions/setup-python@v5
        with:
          # need to specify version to circumvent externally-managed act python
          # which won't let us install dependencies
          python-version: '3.12'
          cache: 'pip'
      - name: Install dependencies
        run: pip install pyyaml mashumaro
      - name: Install xvfb
        run: sudo apt-get update && sudo apt-get install -y xvfb
      - name: Run tests in rcdt_tests container
        run: xvfb-run -a python3 start.py --pytest-no-nvidia
