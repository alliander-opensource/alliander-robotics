services:
  rcdt_gps:
    image: rcdt/robotics:gps
    container_name: rcdt_gps
    network_mode: host
    privileged: true
    mem_limit: 6gb
    tty: true
    volumes:
      - "/tmp/.X11-unix:/tmp/.X11-unix"
      - "/dev:/dev"
    env_file:
      - .env
    command: ["/bin/bash", "-c", "ros2 launch rcdt_gps gps.launch.py"]
