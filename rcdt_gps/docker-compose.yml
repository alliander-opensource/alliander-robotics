services:
  rcdt_gps:
    image: rcdt/robotics:gps-${IMAGE_TAG}
    container_name: rcdt_gps
    network_mode: host
    privileged: true
    mem_limit: 6gb
    tty: true
    volumes:
      - "/tmp/.X11-unix:/tmp/.X11-unix"
      - "/dev:/dev"
    environment:
      - "DISPLAY"
      - "RCUTILS_COLORIZED_OUTPUT=1"
    command: ["/bin/bash", "-c", "ros2 launch rcdt_gps gps.launch.py"]
