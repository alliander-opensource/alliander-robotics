services:
  alliander_ewellix:
    image: allianderrobotics/ewellix
    container_name: alliander_ewellix
    network_mode: host
    privileged: true
    mem_limit: 6gb
    tty: true
    volumes:
      - "/tmp/.X11-unix:/tmp/.X11-unix"
      - "/dev:/dev"
    env_file:
      - .env
    command: ["/bin/bash", "-c", "ros2 launch alliander_ewellix ewellix.launch.py"]
