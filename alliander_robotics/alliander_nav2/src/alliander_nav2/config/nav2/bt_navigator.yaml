# Based on: https://docs.nav2.org/configuration/packages/configuring-bt-navigator.html

bt_navigator:
  ros__parameters:
    default_nav_to_pose_bt_xml: substitute_me
    robot_base_frame: substitute_me
    odom_topic: substitute_me
    default_server_timeout: 10000
    default_cancel_timeout: 10000
    wait_for_service_timeout: 10000
    error_code_names:
      - compute_path_error_code
      - follow_path_error_code
    plugin_lib_names:
    - bt_is_system_healthy_node
