services:
  alliander_joystick:
    image: allianderrobotics/joystick
    container_name: alliander_joystick
    network_mode: host
    privileged: true
    mem_limit: 6gb
    tty: true
    env_file:
      - .env
    volumes:
      - "/tmp/.X11-unix:/tmp/.X11-unix"
      - "/dev:/dev"
    command: ["/bin/bash", "-c", "ros2 launch alliander_joystick joystick.launch.py"]

