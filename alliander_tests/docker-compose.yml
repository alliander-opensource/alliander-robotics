services:
  alliander_tests:
    image: allianderrobotics/tests
    container_name: alliander_tests
    runtime: nvidia
    network_mode: host
    privileged: true
    mem_limit: 6gb
    tty: true
    env_file:
      - .env
    volumes:
      - "/tmp/.X11-unix:/tmp/.X11-unix"
      - "/dev:/dev"
      - "/var/run/docker.sock:/var/run/docker.sock"
      - "./:/alliander_robotics/"
    command:
      ["/bin/bash", "-c", "cd /alliander_robotics"]
