services:
  rcdt_visualization:
    image: rcdt/robotics:visualization-${IMAGE_TAG}
    container_name: rcdt_visualization
    runtime: nvidia
    network_mode: host
    privileged: true
    mem_limit: 6gb
    tty: true
    group_add:
      - "video" # Allows camera access on all platforms, no matter the allocated user rights
    env_file:
      - .env
    volumes:
      - "/tmp/.X11-unix:/tmp/.X11-unix"
      - "/dev:/dev"
    command: ["/bin/bash", "-c", "ros2 launch rcdt_visualization visualization.launch.py"]
